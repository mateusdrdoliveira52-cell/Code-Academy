<section id="inicio" class="hero">

<h1>Code Academy</h1>

<p>
Aprenda programação do zero com aulas práticas e desenvolva projetos reais para o seu portfólio.
</p>

<button id="btnInscrever">
Inscreva-se
</button>

</section>

</header>

<main>

<section class="card" id="cep">

<h2>Consultar CEP</h2>

<input
type="text"
id="cepInput"
placeholder="Digite o CEP"
inputmode="numeric"
maxlength="8">

<button id="btnBuscar">
Buscar
</button>

<div id="resultado"></div>

</section>

<section class="card" id="contato">

<h2>Contato</h2>

<form id="formContato">

<input
type="text"
placeholder="Nome"
autocomplete="name"
required>

<input
type="email"
placeholder="E-mail"
autocomplete="email"
required>

<textarea
placeholder="Mensagem"
required>
</textarea>

<button type="submit">
Enviar
</button>

</form>

</section>

</main>
